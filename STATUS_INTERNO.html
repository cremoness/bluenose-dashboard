<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Interno — Ángelito Chanamé</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    padding: 20px 32px; border-bottom: 1px solid #334155;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-left h1 { font-size: 20px; font-weight: 800; color: white; }
  .header-left p { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .day-badge {
    padding: 6px 18px; border-radius: 20px; font-size: 13px; font-weight: 700;
    background: #6366f1; color: white; cursor: pointer; transition: all 0.2s;
  }
  .day-badge.thursday { background: #0891b2; }
  .meeting-toggle { display: flex; gap: 8px; align-items: center; }
  .toggle-btn {
    padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: 2px solid #334155; background: transparent; color: #94a3b8;
    transition: all 0.2s;
  }
  .toggle-btn.active { background: #6366f1; border-color: #6366f1; color: white; }
  .toggle-btn.active.thu { background: #0891b2; border-color: #0891b2; }

  .container { max-width: 1300px; margin: 0 auto; padding: 24px; }

  /* Account grid */
  .accounts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }

  .account-card {
    background: #1e293b; border-radius: 14px; border: 1px solid #334155;
    overflow: hidden; transition: all 0.2s; cursor: pointer;
  }
  .account-card:hover { border-color: #6366f1; transform: translateY(-1px); }
  .account-card.expanded { border-color: #6366f1; }

  .account-header {
    padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
  }
  .account-name { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .account-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
  .account-stats { display: flex; gap: 8px; align-items: center; }
  .stat-pill { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; }
  .pill-r { background: #450a0a; color: #fca5a5; }
  .pill-y { background: #431407; color: #fdba74; }
  .pill-g { background: #052e16; color: #86efac; }
  .pill-n { background: #1e293b; color: #64748b; border: 1px solid #334155; }

  .account-body { padding: 0 18px 16px; display: none; }
  .account-body.open { display: block; }

  /* Status line items */
  .status-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border-radius: 8px; margin-bottom: 6px;
    border: 1px solid #1e293b; background: #0f172a;
    transition: all 0.2s; cursor: pointer;
  }
  .status-item:hover { border-color: #334155; }
  .status-item.done { opacity: 0.4; }
  .status-item.done .si-text { text-decoration: line-through; }
  .si-chk {
    width: 16px; height: 16px; border: 2px solid #475569; border-radius: 4px;
    flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .si-chk.on { background: #22c55e; border-color: #22c55e; }
  .si-chk.on::after { content: '✓'; color: #0f172a; font-size: 9px; font-weight: 900; }
  .si-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .d-r { background: #ef4444; } .d-y { background: #f59e0b; } .d-g { background: #22c55e; } .d-b { background: #3b82f6; }
  .si-text { font-size: 12px; line-height: 1.4; color: #cbd5e1; flex: 1; }
  .si-owner { font-size: 10px; color: #475569; margin-top: 2px; }
  .si-tag { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; color: #94a3b8; background: #1e293b; border: 1px solid #334155; }
  .si-new { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 8px; background: #312e81; color: #a5b4fc; white-space: nowrap; flex-shrink: 0; }
  .si-client { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; background: #422006; color: #fcd34d; border: 1px solid #92400e; }

  .section-divider { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; margin: 10px 0 6px; padding-left: 2px; }

  /* Summary panel */
  .summary-panel { background: #1e293b; border-radius: 14px; border: 1px solid #334155; padding: 20px 24px; margin-bottom: 20px; }
  .summary-title { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
  .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sum-kpi { text-align: center; }
  .sum-num { font-size: 28px; font-weight: 800; }
  .sum-label { font-size: 11px; color: #64748b; margin-top: 3px; }
  .n-red { color: #ef4444; } .n-yellow { color: #f59e0b; } .n-green { color: #22c55e; }
  .n-blue { color: #6366f1; } .n-cyan { color: #0891b2; }

  .new-badge { display: inline-block; font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 4px; background: #312e81; color: #a5b4fc; margin-left: 4px; vertical-align: middle; }

  .expand-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 12px; }
  .exp-btn { padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid #334155; background: #1e293b; color: #94a3b8; transition: all 0.2s; }
  .exp-btn:hover { border-color: #6366f1; color: #a5b4fc; }

  footer { text-align: center; padding: 20px; font-size: 11px; color: #475569; border-top: 1px solid #1e293b; margin-top: 20px; }

  .new-section { background: #1e1b4b; border: 1px solid #3730a3; border-radius: 14px; padding: 18px 22px; margin-bottom: 20px; }
  .new-section-title { font-size: 13px; font-weight: 700; color: #a5b4fc; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

  .color-ucsp { color: #60a5fa; }
  .color-wv { color: #34d399; }
  .color-upsjb { color: #fb923c; }
  .color-vp { color: #a78bfa; }
  .color-smart { color: #94a3b8; }
  .color-ica { color: #fbbf24; }
  .color-bn { color: #818cf8; }

  .dot-ucsp { background: #3b82f6; }
  .dot-wv { background: #10b981; }
  .dot-upsjb { background: #f97316; }
  .dot-vp { background: #8b5cf6; }

  .empty-state { font-size: 12px; color: #475569; text-align: center; padding: 16px 0; font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <h1>📊 Status Interno — Blue Nose</h1>
      <p>Ángelito Chanamé · Content & Project Manager</p>
    </div>
  </div>
  <div class="meeting-toggle">
    <button class="toggle-btn active" onclick="setDay('lunes', this)">🗓 Lunes</button>
    <button class="toggle-btn" onclick="setDay('jueves', this)">🗓 Jueves</button>
    <div id="day-label" style="font-size:12px;color:#94a3b8;margin-left:8px;">Cargando...</div>
  </div>
</header>

<div class="container">

  <!-- Summary -->
  <div class="summary-panel">
    <div class="summary-title">📈 Resumen de la semana</div>
    <div class="summary-grid">
      <div class="sum-kpi"><div class="sum-num n-red" id="kpi-urgente">—</div><div class="sum-label">🔴 Urgentes</div></div>
      <div class="sum-kpi"><div class="sum-num n-yellow" id="kpi-semana">—</div><div class="sum-label">🟡 Esta semana</div></div>
      <div class="sum-kpi"><div class="sum-num n-green" id="kpi-done">—</div><div class="sum-label">✅ Completadas</div></div>
      <div class="sum-kpi"><div class="sum-num n-blue" id="kpi-clients">—</div><div class="sum-label">🏢 Cuentas activas</div></div>
      <div class="sum-kpi"><div class="sum-num n-cyan" id="kpi-new">—</div><div class="sum-label">🆕 Puntos nuevos</div></div>
    </div>
  </div>

  <!-- New items (dynamic) -->
  <div id="new-section" class="new-section" style="display:none;"></div>

  <div class="expand-bar">
    <button class="exp-btn" onclick="expandAll()">↓ Expandir todo</button>
    <button class="exp-btn" onclick="collapseAll()">↑ Contraer todo</button>
  </div>

  <!-- Account cards (dynamic) -->
  <div class="accounts-grid" id="accounts-grid"></div>

</div>

<footer id="footer-text">Status Interno · Blue Nose · Ángelito Chanamé</footer>

<script src="data.js"></script>
<script>

// ── Config ──────────────────────────────────────────────────────────────────
const CLIENT_CFG = {
  'WV':         { icon: '🌍', colorClass: 'color-wv',    label: 'World Vision',       sub: 'RD · HND · ES · CL · EC · PE · BR' },
  'UCSP':       { icon: '🏛',  colorClass: 'color-ucsp',  label: 'UCSP',               sub: 'Universidad Católica San Pablo' },
  'UPSJB':      { icon: '🎓', colorClass: 'color-upsjb', label: 'UPSJB',              sub: 'Universidad San Juan Bautista' },
  'VP':         { icon: '💳', colorClass: 'color-vp',    label: 'VirtualPos Chile',   sub: 'Soporte Técnico' },
  'Smartimper': { icon: '⚡', colorClass: 'color-smart', label: 'Smartimper',         sub: 'Seguimiento BDR' },
  'Ica':        { icon: '🏦', colorClass: 'color-ica',   label: 'Caja Ica',           sub: 'Pendiente inicio' },
  'BLUENOSE':   { icon: '🔵', colorClass: 'color-bn',    label: 'Blue Nose Interno',  sub: 'Operaciones y procesos' },
};

const WV_COUNTRY = {
  'HND': '🇭🇳 Honduras', 'ES': '🇪🇸 España', 'CL': '🇨🇱 Chile',
  'EC': '🇪🇨 Ecuador', 'PE': '🇵🇪 Perú', 'BR': '🇧🇷 Brasil',
  'RD': '🇩🇴 Rep. Dom.', 'CR': '🇨🇷 Costa Rica', 'General': '🌍 General',
};

const ACCOUNT_ORDER = ['WV','UCSP','UPSJB','VP','Smartimper','Ica','BLUENOSE'];

// ── Build BN team name set ──────────────────────────────────────────────────
const bnFirstNames = new Set();
(TEAM_BN || []).forEach(m => {
  if (m.name) bnFirstNames.add(m.name.trim().toLowerCase().split(' ')[0]);
});

function isClientSide(owner) {
  if (!owner) return false;
  const o = owner.toLowerCase();
  for (const n of bnFirstNames) { if (o.includes(n)) return false; }
  return true;
}

// ── Group tasks by client ───────────────────────────────────────────────────
const byClient = {};

function addTo(acc, bucket, task) {
  if (!byClient[acc]) byClient[acc] = { urgente: [], semana: [], mes: [], done: [] };
  byClient[acc][bucket].push(task);
}

['urgente','semana','mes'].forEach(sec => {
  (TASKS[sec] || []).forEach(t => {
    const acc = t.account || 'General';
    addTo(acc, t.isCompleted ? 'done' : sec, t);
  });
});
(TASKS.done || []).forEach(t => {
  addTo(t.account || 'General', 'done', t);
});

// ── Render helpers ──────────────────────────────────────────────────────────
function dot(sec) {
  return sec === 'urgente' ? 'd-r' : sec === 'mes' ? 'd-g' : 'd-y';
}

function renderItem(t, sec) {
  const isDone = sec === 'done';
  const proj   = (t.project && t.project !== 'General') ? `<span class="si-tag">${t.project}</span>` : '';
  const isNew  = t.isNew ? `<span class="si-new">🆕</span>` : '';
  const client = (!isDone && isClientSide(t.owner)) ? `<span class="si-client">👤 Cliente</span>` : '';
  return `
    <div class="status-item${isDone ? ' done' : ''}" onclick="toggle(this)">
      <div class="si-chk${isDone ? ' on' : ''}"></div>
      <div class="si-dot ${dot(sec)}"></div>
      <div style="flex:1">
        <div class="si-text">${t.text}</div>
        ${t.owner ? `<div class="si-owner">Owner: ${t.owner}</div>` : ''}
      </div>
      ${proj}${client}${isNew}
    </div>`;
}

function renderClientCard(acc) {
  const data = byClient[acc];
  if (!data) return '';
  const { urgente, semana, mes, done } = data;
  const totalActive = urgente.length + semana.length + mes.length;
  if (totalActive + done.length === 0) return '';

  const cfg     = CLIENT_CFG[acc] || { icon: '📋', colorClass: '', label: acc, sub: '' };
  const cardId  = acc.toLowerCase().replace(/[^a-z0-9]/g, '');
  const pills   = [
    urgente.length ? `<span class="stat-pill pill-r">${urgente.length} urg</span>` : '',
    (semana.length + mes.length) ? `<span class="stat-pill pill-y">${semana.length + mes.length} prog</span>` : '',
    done.length    ? `<span class="stat-pill pill-g">${done.length} ✅</span>` : '',
  ].join('');

  let body = '';

  if (acc === 'WV') {
    // Group WV by sub-country
    const byCountry = {};
    const addC = (items, sec) => items.forEach(t => {
      const c = t.project || 'General';
      if (!byCountry[c]) byCountry[c] = [];
      byCountry[c].push({ t, sec });
    });
    addC(urgente, 'urgente'); addC(semana, 'semana'); addC(mes, 'mes');

    Object.entries(byCountry).forEach(([c, items]) => {
      body += `<div class="section-divider">${WV_COUNTRY[c] || c}</div>`;
      // urgente first, then semana, then mes within each country
      ['urgente','semana','mes'].forEach(s => {
        items.filter(i => i.sec === s).forEach(({ t, sec }) => { body += renderItem(t, sec); });
      });
    });
    if (done.length) {
      body += `<div class="section-divider">✅ Completado</div>`;
      done.forEach(t => { body += renderItem(t, 'done'); });
    }
  } else {
    if (urgente.length) { body += `<div class="section-divider">🔴 Urgente</div>`; urgente.forEach(t => { body += renderItem(t, 'urgente'); }); }
    if (semana.length)  { body += `<div class="section-divider">🟡 Esta semana</div>`; semana.forEach(t => { body += renderItem(t, 'semana'); }); }
    if (mes.length)     { body += `<div class="section-divider">🟢 Próximo mes</div>`; mes.forEach(t => { body += renderItem(t, 'mes'); }); }
    if (done.length)    { body += `<div class="section-divider">✅ Completado</div>`; done.forEach(t => { body += renderItem(t, 'done'); }); }
  }

  if (!body) body = `<div class="empty-state">Sin tareas activas</div>`;

  // Auto-expand cards with urgent tasks
  const autoOpen = urgente.length > 0 ? ' open' : '';

  return `
    <div class="account-card" id="card-${cardId}">
      <div class="account-header" onclick="toggleCard('${cardId}')">
        <div>
          <div class="account-name ${cfg.colorClass}">${cfg.icon} ${cfg.label}</div>
          <div class="account-sub">${cfg.sub}</div>
        </div>
        <div class="account-stats">${pills}</div>
      </div>
      <div class="account-body${autoOpen}" id="body-${cardId}">
        ${body}
      </div>
    </div>`;
}

// ── Main render ─────────────────────────────────────────────────────────────
function renderStatus() {
  const allActive = [...(TASKS.urgente||[]), ...(TASKS.semana||[])].filter(t => !t.isCompleted);
  const allDone   = [
    ...(TASKS.done||[]),
    ...(TASKS.urgente||[]).filter(t => t.isCompleted),
    ...(TASKS.semana||[]).filter(t => t.isCompleted),
  ];

  const totalUrgente = (TASKS.urgente||[]).filter(t => !t.isCompleted).length;
  const totalSemana  = (TASKS.semana||[]).filter(t => !t.isCompleted).length;
  const totalDone    = allDone.length;
  const activeAccs   = Object.keys(byClient).filter(k => byClient[k].urgente.length + byClient[k].semana.length > 0).length;
  const newItems     = allActive.filter(t => t.isNew).length;

  document.getElementById('kpi-urgente').textContent = totalUrgente;
  document.getElementById('kpi-semana').textContent  = totalSemana;
  document.getElementById('kpi-done').textContent    = totalDone;
  document.getElementById('kpi-clients').textContent = activeAccs;
  document.getElementById('kpi-new').textContent     = newItems;

  // New items section
  const newTasks = allActive.filter(t => t.isNew);
  const newSection = document.getElementById('new-section');
  if (newTasks.length > 0) {
    const d = new Date();
    const label = d.toLocaleDateString('es-PE', {day:'2-digit', month:'2-digit', year:'2-digit'}).replace(/\//g,'.');
    newSection.innerHTML = `
      <div class="new-section-title">🆕 Puntos nuevos — ${label}</div>
      ${newTasks.map(t => {
        const sec = (TASKS.urgente||[]).includes(t) ? 'urgente' : 'semana';
        return renderItem(t, sec);
      }).join('')}`;
    newSection.style.display = 'block';
  } else {
    newSection.style.display = 'none';
  }

  // Account cards
  const allAccKeys = [...ACCOUNT_ORDER, ...Object.keys(byClient).filter(k => !ACCOUNT_ORDER.includes(k))];
  document.getElementById('accounts-grid').innerHTML = allAccKeys.map(renderClientCard).join('');

  // Footer + day label
  const today = new Date();
  const fmtDate = today.toLocaleDateString('es-PE', {day:'2-digit', month:'2-digit', year:'2-digit'}).replace(/\//g,'.');
  document.getElementById('footer-text').textContent = `Status Interno · Blue Nose · Ángelito Chanamé · Actualizado ${fmtDate}`;
  document.getElementById('day-label').textContent = `Actualizado: ${fmtDate}`;
}

renderStatus();

// ── Controls ─────────────────────────────────────────────────────────────────
function toggleCard(id) {
  document.getElementById('body-' + id).classList.toggle('open');
}
function toggle(el) {
  el.querySelector('.si-chk').classList.toggle('on');
  el.classList.toggle('done');
}
function expandAll() {
  document.querySelectorAll('.account-body').forEach(b => b.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.account-body').forEach(b => b.classList.remove('open'));
}
function setDay(day, btn) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active','thu'));
  btn.classList.add('active');
  if (day === 'jueves') btn.classList.add('thu');
  const today = new Date();
  const fmtDate = today.toLocaleDateString('es-PE', {day:'2-digit', month:'2-digit', year:'2-digit'}).replace(/\//g,'.');
  document.getElementById('day-label').textContent = `Reunión ${day === 'lunes' ? 'Lunes' : 'Jueves'} · ${fmtDate}`;
}
</script>
</body>
</html>
