<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Brief — Ángelito Chanamé</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    padding: 20px 32px; border-bottom: 1px solid #334155;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .header-left h1 { font-size: 20px; font-weight: 800; color: #fff; }
  .header-left p  { font-size: 12px; color: #64748b; margin-top: 3px; }
  #fecha-badge {
    background: #6366f1; color: #fff; padding: 7px 18px;
    border-radius: 20px; font-size: 13px; font-weight: 700;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

  /* Sección */
  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 13px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
  }
  .s-red   { background: rgba(239,68,68,.15);  color: #f87171; }
  .s-yel   { background: rgba(234,179,8,.12);  color: #fbbf24; }
  .s-blue  { background: rgba(99,102,241,.15); color: #818cf8; }
  .s-green { background: rgba(34,197,94,.12);  color: #4ade80; }

  /* Tarjeta de tarea */
  .task {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    padding: 13px 16px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px;
    cursor: pointer; transition: background .15s, border-color .15s;
  }
  .task:hover { background: #263348; border-color: #475569; }
  .task.done  { opacity: .45; }
  .task.done .task-text { text-decoration: line-through; }

  .chk {
    width: 18px; height: 18px; border-radius: 5px; border: 2px solid #475569;
    flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .task.done .chk { background: #22c55e; border-color: #22c55e; }
  .chk svg { display: none; }
  .task.done .chk svg { display: block; }

  .task-text { font-size: 13.5px; line-height: 1.5; color: #cbd5e1; flex: 1; }
  .task-text strong { color: #e2e8f0; }

  .tag {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    flex-shrink: 0; margin-top: 2px;
  }
  .tag-wv   { background: rgba(34,197,94,.15);  color: #4ade80; }
  .tag-up   { background: rgba(251,146,60,.15); color: #fb923c; }
  .tag-uc   { background: rgba(96,165,250,.15); color: #60a5fa; }
  .tag-vp   { background: rgba(167,139,250,.15);color: #a78bfa; }
  .tag-sm   { background: rgba(234,179,8,.15);  color: #fbbf24; }
  .tag-ci   { background: rgba(52,211,153,.15); color: #34d399; }
  .tag-new  { background: rgba(239,68,68,.2);   color: #f87171; }

  /* Reuniones del día */
  .meeting {
    background: linear-gradient(90deg, rgba(99,102,241,.12), rgba(99,102,241,.04));
    border: 1px solid rgba(99,102,241,.3); border-radius: 10px;
    padding: 11px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: #c7d2fe;
  }
  .meeting-icon { font-size: 18px; }

  /* Contador */
  .counts { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .count-pill {
    padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }
  .cp-r { background: rgba(239,68,68,.15);  color: #f87171; }
  .cp-y { background: rgba(234,179,8,.12);  color: #fbbf24; }
  .cp-g { background: rgba(34,197,94,.12);  color: #4ade80; }

  /* Filtros cliente */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
    background: #1e293b; border: 1px solid #334155; color: #94a3b8;
    cursor: pointer; transition: all .15s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: #6366f1; border-color: #6366f1; color: #fff;
  }

  /* Footer */
  footer {
    text-align: center; padding: 20px; color: #475569; font-size: 11px;
    border-top: 1px solid #1e293b; margin-top: 20px;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>☀️ Daily Brief</h1>
    <p>Ángelito Chanamé — Blue Nose</p>
  </div>
  <div id="fecha-badge">Cargando...</div>
</header>

<div class="container">

  <!-- Contadores -->
  <div class="counts">
    <div class="count-pill cp-r">🔴 <span id="cnt-r">0</span> urgentes</div>
    <div class="count-pill cp-y">🟡 <span id="cnt-y">0</span> esta semana</div>
    <div class="count-pill cp-g">✅ <span id="cnt-done">0</span> completadas</div>
  </div>

  <!-- Filtros por cliente -->
  <div class="filters">
    <button class="filter-btn active" onclick="filter('all',this)">Todos</button>
    <button class="filter-btn" onclick="filter('WV',this)">🌍 World Vision</button>
    <button class="filter-btn" onclick="filter('UPSJB',this)">🎓 UPSJB</button>
    <button class="filter-btn" onclick="filter('UCSP',this)">🏛 UCSP</button>

  <!-- Reuniones del día -->
  <div class="section" id="sec-meetings">

    <div id="meetings-container"></div>
  </div>

  <!-- URGENTE -->
  <div class="section">
    <div class="section-title s-red">🔴 Urgente — Hoy mismo</div>
    <div id="tasks-urgente"></div>
  </div>

  <!-- ESTA SEMANA -->
  <div class="section">
    <div class="section-title s-yel">🟡 Esta semana</div>
    <div id="tasks-semana"></div>
  </div>

  <!-- PRÓXIMO MES -->
  <div class="section">

  </div>

</div>

<footer id="footer-update">Actualizado: 19.03.2026 — Status interno jueves</footer>

<script>
// ═══════════════════════════════════════════════════════════════

    { text: "Cristian P: cerrar ticket donaciones únicas (ajuste en integración) — HOY", tag: "VP", tagClass: "tag-vp", owner: "Cristian P", clients: ["VP"] },
    { text: "Cristian P: cerrar ticket limpieza negocios duplicados F2F (750 contactos) — HOY", tag: "VP", tagClass: "tag-vp", owner: "Cristian P", clients: ["VP"] },
    { text: "Cristian P: escribir a María (WV PE) por Discord para obtener más info del ticket 'limpieza de lista y consulta web'", tag: "VP", tagClass: "tag-vp", owner: "Cristian P", clients: ["VP","WV"] },
    { text: "Sofía: subir base de Iglesias — Esther confirmó que Jorge y ella tienen el trabajo listo", tag: "WV ES", tagClass: "tag-wv", owner: "Sofía", clients: ["WV"] },
  ],
  semana: [
    // UCSP
    { text: "Enrique: esperar brief de César Puma para propuesta Mesa de Ayuda (IA + WhatsApp sobre Zoho) — casi seguro para abril/mayo", tag: "UCSP", tagClass: "tag-uc", owner: "Enrique", clients: ["UCSP"], isNew: true },
    { text: "Enrique: actualizar propuesta coaching SGA (5-6 personas, dejaron Dzine Lab) + seguimiento alumni con Efraín Centeno", tag: "UCSP", tagClass: "tag-uc", owner: "Enrique", clients: ["UCSP"], isNew: true },
    { text: "Crear checklist unificado con IA de todos los puntos de reuniones UCSP (1ra → última) para blindar entregables y facilitar conformidades", tag: "UCSP", tagClass: "tag-uc", owner: "Ángelito", clients: ["UCSP","yo"], isNew: true },
    { text: "CENDES: esperar respuesta formal de aprobación de cotización (María Daniela en proceso de revisión desde 13.03)", tag: "UCSP", tagClass: "tag-uc", owner: "Ángelito", clients: ["UCSP","yo"] },
    { text: "Enrique: coordinar entrevista con Ángelo sobre Centro de Idiomas + entrevistas con alumnos y desertores", tag: "UCSP", tagClass: "tag-uc", owner: "Enrique", clients: ["UCSP"] },
    // WV ES SIMMA
    { text: "Sofía + Jorge: cruzar base SIMMA vs HubSpot — partners sin contacto/pledge, emails provisionales, campos faltantes · Accionables canal: sincronizar nombre iglesia, PartnerID, URL web, integración leads proveedores", tag: "WV ES", tagClass: "tag-wv", owner: "Sofía + Jorge + Cristian P", clients: ["WV"], isNew: true },
    { text: "Sofía: agendar reunión con Esther para revisar hallazgos SIMMA y definir acciones correctivas (5 categorías)", tag: "WV ES", tagClass: "tag-wv", owner: "Sofía", clients: ["WV"] },
    { text: "Cristian P: configurar propiedades personalizadas (ChildID, AddDate, MediaType, datos bancarios) según hallazgos Esther", tag: "WV ES", tagClass: "tag-wv", owner: "Cristian P", clients: ["WV"] },
    // WV HND
    { text: "Luis: finalizar y enviar piezas campaña Wash + hablar con Jorge Girón para conectar WhatsApp a cuenta de Meta", tag: "WV HND", tagClass: "tag-wv", owner: "Luis", clients: ["WV"] },
    { text: "Pablo: gestionar permisos web/landing para Luis + incluir devs en correos Express Pago (recibieron documentación, en espera)", tag: "WV HND", tagClass: "tag-wv", owner: "Pablo", clients: ["WV"] },
    // WV EC
    { text: "Cristian P: organizar tickets WV Ecuador por prioridad — empezar con débitos y automatizaciones, avanzar de a 2 en paralelo. NO sacar todos de golpe", tag: "WV EC", tagClass: "tag-wv", owner: "Cristian P + Pablo + Marcos", clients: ["WV"], isNew: true },
    // UPSJB
    { text: "Blue Nose: asignar equipo exclusivo para 4,800 leads sin gestión (A Distancia) · SLA ≤5 min", tag: "UPSJB", tagClass: "tag-up", owner: "Enrique/Pablo", clients: ["UPSJB"] },
    { text: "Revisar puntos amarillos y rojos en los 3 docs de Enrique — definir acciones correctivas + responder correo de Enrique", tag: "UPSJB", tagClass: "tag-up", owner: "Ángelito + Enrique", clients: ["UPSJB","yo"] },
    { text: "Marcos: crear propiedad HubSpot para segmentar lista Blue Nose (5,600) en 3 grupos de ~2,000 para envíos mensuales · Permisos dados ✅", tag: "UPSJB", tagClass: "tag-up", owner: "Marcos", clients: ["UPSJB"], isNew: true },
    { text: "Estuardo: entregar Buyer Persona para padres esta semana + coordinar QR en charlas desde quincena de marzo", tag: "UPSJB", tagClass: "tag-up", owner: "Estuardo", clients: ["UPSJB"] },
    { text: "Carlos: finalizar limpieza de duplicados en HubSpot + enviar programas de Admón Internacional y Marketing", tag: "UPSJB", tagClass: "tag-up", owner: "Carlos", clients: ["UPSJB"] },
    // VirtualPos CL
    { text: "Cristian P: reenviar a Diana lista y recursos para importación de negocios pendientes (contactos web Pau)", tag: "VP CL", tagClass: "tag-vp", owner: "Cristian P", clients: ["VP"] },
    { text: "Diana + Ornella: revisar 47 contactos con negocios duplicados + regularizar negocios con múltiples métodos de pago", tag: "VP CL", tagClass: "tag-vp", owner: "Diana + Ornella", clients: ["VP"] },
    { text: "Ornella: finalizar facturación manual F2F (enero y febrero) — avisar a Pablo para coordinar automatización", tag: "VP CL", tagClass: "tag-vp", owner: "Ornella", clients: ["VP"] },
    { text: "Cristian P: instalar MCPs de HubSpot, Cloudpod y GitHub en Antigravity — eliminar skills problemáticos", tag: "VP", tagClass: "tag-vp", owner: "Cristian P", clients: ["VP"], isNew: true },
    // Smartimper
    { text: "Escribirle al cliente (~30.03) para preguntar cómo va con la incorporación del BDR. Sin respuesta → avisar a Enrique", tag: "Smartimper", tagClass: "tag-sm", owner: "Ángelito", clients: ["Smartimper","yo"] },
  ],
  mes: [
    { text: "UCSP SpotLight: presentar ideas en reunión de abril (ppt ya lista) — primer miércoles de abril", tag: "UCSP", tagClass: "tag-uc", owner: "Ángelito", clients: ["UCSP","yo"] },
    { text: "WV RD: gestionar cierre formal de contrato · Due: 31.03.26", tag: "WV RD", tagClass: "tag-wv", owner: "Ángelito + Enrique", clients: ["WV","yo"] },
  ]
};

const MEETINGS_BY_DAY = {
  0: [
    { icon: "📋", text: "Status interno Blue Nose — reunión de inicio de semana" },
  ],
  2: [
    { icon: "🌍", text: "WV HND — revisión piezas y WF con Luis y Pablo (esta semana: adelantada de jueves)" },
  ],
  3: [
    { icon: "📋", text: "Status interno Blue Nose — reunión de cierre de semana" },
    { icon: "🌍", text: "WV HND — reunión con Express Pago (pasarela de pagos)" },
  ],
};

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
let doneSet = JSON.parse(localStorage.getItem('brief-done') || '[]');
let currentFilter = 'all';

const DIAS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

function initDate() {
  const now = new Date();
  const d = DIAS[now.getDay()];
  const m = MESES[now.getMonth()];
  document.getElementById('fecha-badge').textContent = `${d}, ${now.getDate()} de ${m} de ${now.getFullYear()}`;

  // Reuniones del día
  const meetings = MEETINGS_BY_DAY[now.getDay()] || [];
  const mc = document.getElementById('meetings-container');
  if (meetings.length === 0) {
    document.getElementById('sec-meetings').style.display = 'none';
  } else {
    meetings.forEach(m => {
      mc.innerHTML += `<div class="meeting"><span class="meeting-icon">${m.icon}</span>${m.text}</div>`;
    });
  }
}

function renderTask(t, section, idx) {
  const id = `${section}-${idx}`;
  const isDone = doneSet.includes(id);
  const visible = currentFilter === 'all' || (t.clients && t.clients.includes(currentFilter));
  return `
    <div class="task ${isDone ? 'done' : ''}" data-id="${id}" data-clients="${(t.clients||[]).join(',')}"
         style="${visible ? '' : 'display:none'}" onclick="toggleDone('${id}',this)">
      <div class="chk">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="task-text">
        ${t.isNew ? '<span class="tag tag-new">🆕 HOY</span> ' : ''}
        ${t.text}
        ${t.owner ? `<span style="color:#475569;font-size:11.5px;"> · ${t.owner}</span>` : ''}
      </div>
      <span class="tag ${t.tagClass}">${t.tag}</span>
    </div>`;
}

function renderAll() {
  ['urgente','semana','mes'].forEach(sec => {
    const container = document.getElementById(`tasks-${sec}`);
    container.innerHTML = TASKS[sec].map((t,i) => renderTask(t, sec, i)).join('');
  });
  updateCounts();
}

function toggleDone(id, el) {
  if (doneSet.includes(id)) {
    doneSet = doneSet.filter(x => x !== id);
    el.classList.remove('done');
  } else {
    doneSet.push(id);
    el.classList.add('done');
  }
  localStorage.setItem('brief-done', JSON.stringify(doneSet));
  updateCounts();
}

function updateCounts() {
  const allTasks = document.querySelectorAll('.task');
  const done = document.querySelectorAll('.task.done').length;
  document.getElementById('cnt-done').textContent = done;

  const urgentes = document.querySelectorAll('#tasks-urgente .task:not(.done)').length;
  const semana   = document.querySelectorAll('#tasks-semana .task:not(.done)').length;
  document.getElementById('cnt-r').textContent = urgentes;
  document.getElementById('cnt-y').textContent = semana;
}

function filter(client, btn) {
  currentFilter = client;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.task').forEach(t => {
    const clients = t.dataset.clients || '';
    if (client === 'all' || clients.split(',').includes(client)) {
      t.style.display = '';
    } else {
      t.style.display = 'none';
    }
  });
}

// Init
initDate();
renderAll();
</script>
</body>
</html>
